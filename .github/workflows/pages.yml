name: Deploy GitHub Pages

# Триггерим деплой когда меняется:
#   - src/** (React/TypeScript/CSS — source of truth)
#   - public/** (статические ассеты — character.png)
#   - index.html / vite.config.ts / package.json / package-lock.json (конфиги)
#   - сам workflow файл
# Правки instal/, workflows/, Notebook/, README.md НЕ триггерят пересборку.
on:
  push:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'public/**'
      - 'index.html'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.ts'
      - '.github/workflows/pages.yml'
  # Ручной запуск из вкладки Actions — на случай форсированного деплоя.
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Один деплой за раз — второй отменяет первый.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20 LTS
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'           # авто-кеш ~/.npm по package-lock.json

      - name: Install dependencies
        run: npm ci --no-fund --no-audit

      - name: Build (Vite → docs-site/dist)
        # BASE_URL оставляем пустым — subpath /Kaggle_Workspace_FreeGPU/
        # зашит уже в vite.config.ts для production-сборки.
        run: npm run build
        env:
          CI: 'true'              # подавляет Vite dev-only логи

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs-site/dist

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
